<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito: Sistema de Sorteio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="sorteio-container">
        <h2>Sorteador de Nomes</h2>
        
        <div class="vencedor-box" id="txtSorteado">Nenhum sorteio realizado</div>

        <div class="form-group">
            <input type="text" id="inputNome" placeholder="Digite um nome...">
            <button class="btn-add" onclick="adicionarNome()">Adicionar</button>
        </div>

        <h3>Participantes na Lista:</h3>
        <ul id="listaDeParticipantes">
            
        </ul>

        <button class="btn-sortear" onclick="sortearNome()">Sortear!</button>
    </div>

<script src="/js/script.js"></script>
</html>
</body>
